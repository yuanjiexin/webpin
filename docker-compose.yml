version: '3.8'

# 数据库已迁移至 Supabase，无需本地 PostgreSQL
# 直接启动后端服务即可

services:
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    env_file:
      - ./packages/backend/.env
    volumes:
      - ./packages/backend:/app
      - /app/node_modules
    command: ['npm', 'run', 'dev']
