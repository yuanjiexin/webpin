<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebPin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid #f0f0f0;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: #FF6B35;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 14px;
    }

    .title { font-size: 16px; font-weight: 700; }
    .subtitle { font-size: 12px; color: #999; }

    /* 未登录状态 */
    #view-auth { padding: 16px; }

    .form-group { margin-bottom: 12px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #555;
      margin-bottom: 4px;
    }

    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.1s;
    }

    input:focus { border-color: #FF6B35; }

    .btn {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.1s;
    }

    .btn-primary { background: #FF6B35; color: white; }
    .btn-primary:hover { background: #E64E1C; }
    .btn-secondary { background: #f5f5f5; color: #555; }
    .btn-secondary:hover { background: #ebebeb; }

    .toggle-auth {
      text-align: center;
      margin-top: 10px;
      font-size: 12px;
      color: #999;
    }

    .toggle-auth a { color: #FF6B35; cursor: pointer; text-decoration: none; }

    .error-msg {
      background: #fff0ee;
      border: 1px solid #ffccc7;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      color: #d32f2f;
      margin-bottom: 10px;
      display: none;
    }

    /* 已登录状态 */
    #view-main { padding: 16px; display: none; }

    .user-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #fafafa;
      border-radius: 8px;
      margin-bottom: 14px;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 14px;
      flex-shrink: 0;
    }

    .user-info { flex: 1; }
    .user-name { font-weight: 600; font-size: 13px; }
    .user-email { font-size: 11px; color: #999; }

    .logout-btn {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 12px;
    }
    .logout-btn:hover { color: #d32f2f; }

    /* 项目选择器 */
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      font-size: 13px;
      color: #333;
      background: white;
      outline: none;
      margin-bottom: 8px;
    }

    .new-project-row {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }

    .new-project-row input { margin: 0; }

    .btn-sm {
      padding: 8px 12px;
      border: 1.5px solid #FF6B35;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      background: white;
      color: #FF6B35;
    }

    .btn-sm:hover { background: #fff5f1; }

    /* 操作按钮区 */
    .actions { display: flex; flex-direction: column; gap: 8px; }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: #f9f9f9;
      border: 1px solid #efefef;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #333;
      transition: background 0.1s;
      width: 100%;
      text-align: left;
    }

    .action-btn:hover { background: #f0f0f0; }

    .action-btn.primary {
      background: #FF6B35;
      border-color: #FF6B35;
      color: white;
    }

    .action-btn.primary:hover { background: #E64E1C; }

    .action-icon { font-size: 16px; }

    .api-key-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: #f5f5f5;
      border-radius: 6px;
      margin-top: 10px;
      font-size: 11px;
      color: #888;
    }

    .api-key-value {
      font-family: monospace;
      font-size: 11px;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .copy-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #FF6B35;
      font-size: 11px;
      font-weight: 500;
    }

    .loading { text-align: center; padding: 20px; color: #aaa; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">W</div>
    <div>
      <div class="title">WebPin</div>
      <div class="subtitle">网页批注工具</div>
    </div>
  </div>

  <!-- 未登录视图 -->
  <div id="view-auth">
    <div id="auth-error" class="error-msg"></div>

    <div id="login-form">
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="login-email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="login-password" placeholder="输入密码">
      </div>
      <button class="btn btn-primary" id="login-btn">登录</button>
      <div class="toggle-auth">没有账号？<a id="go-register">立即注册</a></div>
    </div>

    <div id="register-form" style="display:none;">
      <div class="form-group">
        <label>姓名</label>
        <input type="text" id="reg-name" placeholder="你的名字">
      </div>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="reg-email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="reg-password" placeholder="至少6位">
      </div>
      <button class="btn btn-primary" id="register-btn">注册</button>
      <div class="toggle-auth">已有账号？<a id="go-login">返回登录</a></div>
    </div>
  </div>

  <!-- 已登录主视图 -->
  <div id="view-main">
    <div class="user-row">
      <div class="avatar" id="user-avatar">?</div>
      <div class="user-info">
        <div class="user-name" id="user-name">-</div>
        <div class="user-email" id="user-email">-</div>
      </div>
      <button class="logout-btn" id="logout-btn">退出</button>
    </div>

    <div class="section-title">当前项目</div>
    <select id="project-select">
      <option value="">— 选择项目 —</option>
    </select>

    <div class="new-project-row">
      <input type="text" id="new-project-name" placeholder="新建项目名...">
      <button class="btn-sm" id="create-project-btn">创建</button>
    </div>

    <div class="actions" style="margin-top:14px;">
      <button class="action-btn primary" id="activate-btn">
        <span class="action-icon">✏️</span>
        <span>激活批注模式</span>
      </button>
      <button class="action-btn" id="sidebar-btn">
        <span class="action-icon">💬</span>
        <span>查看批注列表</span>
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
